<!-- InstantTranscriber icon-only (perfectly centered). Save as: instanttranscriber-icon.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" fill="none" role="img" aria-label="InstantTranscriber icon">
  <defs>
    <linearGradient id="it_grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6D5CFF"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="it_shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0B102A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g filter="url(#it_shadow)">
    <rect x="0" y="0" width="96" height="96" rx="24" fill="#FFFFFF"/>
    <rect x="0.75" y="0.75" width="94.5" height="94.5" rx="23.25" stroke="#E9ECF5"/>
  </g>

  <!-- Headphone arc (centered at x=48) -->
  <path d="M18 46 C18 29.984 31.984 16 48 16 C64.016 16 78 29.984 78 46"
        stroke="url(#it_grad)" stroke-width="8" stroke-linecap="round"/>

  <!-- Ear cups -->
  <rect x="12" y="46" width="16" height="26" rx="8" fill="url(#it_grad)"/>
  <rect x="68" y="46" width="16" height="26" rx="8" fill="url(#it_grad)"/>

  <!-- Waveform bars (centered at x=48) -->
  <g transform="translate(25,38)">
    <rect x="0"  y="22" width="6" height="20" rx="3" fill="url(#it_grad)"/>
    <rect x="10" y="14" width="6" height="28" rx="3" fill="url(#it_grad)"/>
    <rect x="20" y="6"  width="6" height="36" rx="3" fill="url(#it_grad)"/>
    <rect x="30" y="14" width="6" height="28" rx="3" fill="url(#it_grad)"/>
    <rect x="40" y="22" width="6" height="20" rx="3" fill="url(#it_grad)"/>
  </g>
</svg>